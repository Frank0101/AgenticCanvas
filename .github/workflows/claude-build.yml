name: Claude Build

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # The extra instructions below are CI-specific observability/output asks,
          # kept out of the skill itself so it stays usable outside GitHub too.
          prompt: |
            /build ${{ github.event.comment.body || github.event.review.body || github.event.issue.body }}

            Every time you launch a subagent, add an item to your tracked comment's
            task list for it, named after the subagent. When that subagent terminates,
            update its item with a one-line summary of its result. Do this for every
            launch, including repeated ones (e.g. re-invoking the engineer after a
            failed test) — each gets its own item, not a reused one.

            When opening the pull request, structure its description as:

            ## Summary
            <the engineer's full implementation report, verbatim>

            ## Testing
            <the tester's full findings report, verbatim>

          # Force tag mode's tracking comment even though we're using a custom prompt
          # (custom prompt puts the action in "automation mode", which skips it by default)
          track_progress: true

          # TEMP DEBUG: full raw tool call/result log, including permission denials
          # normally hidden. May leak secrets in output — remove once /build works.
          # show_full_output: true

          # Adds Skill and Agent (missing from tag mode's defaults, needed to invoke
          # /build and its subagents) plus unscoped Bash (default only allows git).
          # Write/Edit omitted: acceptEdits permission mode already covers those
          # in-workspace; listing them would widen that to the whole runner.
          claude_args: |
            --allowedTools "Skill,Agent,Bash"
